services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Do not pass runtime DATABASE_URL/REDIS_URL into the image build stage.
      # Build uses force-dynamic routes; see Dockerfile builder ENV overrides.
    container_name: chustelon-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chustelon}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chustelon}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - chustelon-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/categories"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chustelon-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chustelon}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chustelon}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chustelon-net
    entrypoint: ["./docker-entrypoint.sh"]
    command: ["prisma", "migrate", "deploy"]
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: chustelon-seed
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chustelon}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chustelon}?schema=public
      SEED_DB: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chustelon-net
    command: ["npx", "prisma", "db", "seed"]
    restart: "no"
    profiles:
      - seed

  postgres:
    image: postgres:16-alpine
    container_name: chustelon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chustelon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-chustelon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chustelon}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chustelon-net

  redis:
    image: redis:7-alpine
    container_name: chustelon-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - chustelon-net

  nginx:
    image: nginx:alpine
    container_name: chustelon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - chustelon-net

  certbot:
    image: certbot/certbot
    container_name: chustelon-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:

networks:
  chustelon-net:
    driver: bridge
