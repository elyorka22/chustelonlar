# Use with DigitalOcean Managed PostgreSQL (no local postgres container)
# Usage: docker compose -f docker-compose.yml -f docker-compose.managed-db.yml up -d

services:
  app:
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      redis:
        condition: service_started

  migrate:
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on: {}

  seed:
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on: {}

  postgres:
    profiles:
      - disabled
